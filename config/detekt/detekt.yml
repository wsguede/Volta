config:
  validation: true
  warningsAsErrors: false

naming:
  FunctionNaming:
    active: true
    ignoreAnnotated:
      - 'Composable'

style:
  ForbiddenComment:
    active: false
  MagicNumber:
    active: true
    ignoreEnums: true
  UnusedPrivateMember:
    active: true
    ignoreAnnotated:
      - 'Preview'
  UnusedPrivateProperty:
    active: false
  UnusedParameter:
    active: true
    ignoreAnnotated:
      - 'Composable'
