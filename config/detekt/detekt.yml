complexity:
  LongMethod:
    allowedLines: 60
  LongParameterList:
    allowedFunctionParameters: 8
    allowedConstructorParameters: 10
  TooManyFunctions:
    allowedFunctionsPerFile: 20
    allowedFunctionsPerClass: 15

style:
  MagicNumber:
    active: false
  WildcardImport:
    active: true
  MaxLineLength:
    maxLineLength: 120
  ReturnCount:
    max: 4

naming:
  FunctionNaming:
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][A-Za-z0-9]*'
